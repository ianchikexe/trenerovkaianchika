<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ЯНЧИК · 2 МЕСЯЦА АДА | Тренировки + Питание</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Montserrat:wght@400;600;700;800;900&family=Syncopate:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
    
        }
        function playBeep(freq=800, dur=0.2) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + dur);
            } catch(e) {}
        }

        // Навешиваем события на кнопки таймеров
        document.querySelectorAll('.ex-timer-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const rest = parseInt(btn.getAttribute('data-rest'));
                const disp = document.getElementById('disp_' + id);
                if (disp) startMiniTimer(id, rest, disp);
                // Разблокируем аудио
                getAudioContext();
            });
        });

        // Разрешаем аудио при первом клике в любом месте
        document.body.addEventListener('click', () => getAudioContext(), { once: true });
    </script>
</body>
</html>
